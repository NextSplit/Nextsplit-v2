name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: TypeScript + ESLint + Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit
        continue-on-error: true  # F4.1 (audit) — flip to blocking after database.generated.ts adoption PR

      - name: ESLint
        run: npx eslint src --ext .ts,.tsx --max-warnings 600
        continue-on-error: true  # F0.4 (audit) — ceiling raised from 0 to 600 (current ~525); keep continue-on-error until errors are cleaned up

      # F0.4 (audit) staged CI unblock: tests are first to flip blocking
      # because vitest infra was fixed and all 52 tests pass on main as of
      # PR #(this). tsc + eslint stay non-blocking until F4.1 cleanup +
      # eslint error sweep.
      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Stub env vars for build — real values in Vercel
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
          NEXT_PUBLIC_POSTHOG_KEY: phc_placeholder
          NEXT_PUBLIC_POSTHOG_HOST: https://app.posthog.com
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: placeholder-vapid-key
          NEXT_PUBLIC_PREMIUM_ENFORCED: 'false'
          NEXT_PUBLIC_SITE_URL: 'https://nextsplit.app'
          ANTHROPIC_API_KEY: 'placeholder'
          RESEND_API_KEY: 'placeholder'
          CRON_SECRET: 'placeholder'
          SUPABASE_SERVICE_ROLE_KEY: 'placeholder'
